<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon</title>
</head>
<body>
<script>
let games = [
    { id: "P001", name: "MineCraft", price: 24, category: "Khám phá", developer: "Microsoft", amount: 26 },
    { id: "P002", name: "Roblox", price: 5, category: "Khám phá", developer: "Microsoft", amount: 46 },
    { id: "P003", name: "GTA", price: 24, category: "Hành động", developer: "Twocent", amount: 17 },
];

let choice;
do {
    choice = prompt(`
1. Menu game
2. Thêm game
3. Hiển thị danh sách game
4. Cập nhật thông tin game
5. Xóa game
6. Cập nhật hãng game
7. Tìm game
8. Sắp xếp theo giá
9. Bán game
0. Thoát
`);
    switch (choice) {
        case "1": case1(); break;
        case "2": case2(); break;
        case "3": case3(); break;
        case "4": case4(); break;
        case "5": case5(); break;
        case "6": case6(); break;
        case "7": case7(); break;
        case "8": case8(); break;
        case "9": case9(); break;
    }
} while (choice !== "0");

function case1() {
    case3();
}

function case2() {
    let newGame = {};

    while (true) {
        newGame.id = prompt("Nhập ID game mới:").trim();
        if (games.some(g => g.id === newGame.id)) {
            alert("ID không được trùng");
        } else break;
    }

    while (true) {
        newGame.name = prompt("Nhập tên game mới:").trim();
        if (newGame.name === "") alert("Tên không được để trống");
        else break;
    }

    while (true) {
        newGame.price = Number(prompt("Nhập giá game:"));
        if (isNaN(newGame.price) || newGame.price < 0) alert("Giá không hợp lệ");
        else break;
    }

    while (true) {
        newGame.category = prompt("Nhập thể loại game:").trim();
        if (newGame.category === "") alert("Không được để trống");
        else break;
    }

    while (true) {
        newGame.developer = prompt("Nhập nhà phát hành:").trim();
        if (newGame.developer === "") alert("Không được để trống");
        else break;
    }

    while (true) {
        newGame.amount = Number(prompt("Nhập số lượng:"));
        if (isNaN(newGame.amount) || newGame.amount < 0) alert("Số lượng không hợp lệ");
        else break;
    }

    games.push(newGame);
    alert("Thêm thành công");
}

function case3() {
    let result = "===== DANH SÁCH GAME =====\n";
    games.forEach(g => {
        result += `ID: ${g.id} | Name: ${g.name} | Price: ${g.price}$ | Category: ${g.category} | Developer: ${g.developer} | Amount: ${g.amount}\n`;
    });
    alert(result);
}

function case4() {
    let id = prompt("Nhập ID game muốn cập nhật:");
    let game = games.find(g => g.id === id);
    if (!game) {
        alert("Không tìm thấy");
        return;
    }

    game.name = prompt("Tên mới:", game.name);
    game.price = Number(prompt("Giá mới:", game.price));
    game.category = prompt("Thể loại mới:", game.category);
    game.developer = prompt("Hãng mới:", game.developer);
    game.amount = Number(prompt("Số lượng mới:", game.amount));
    alert("Cập nhật thành công");
}

function case5() {
    let id = prompt("Nhập ID game muốn xóa:");
    let index = games.findIndex(g => g.id === id);
    if (index === -1) {
        alert("Không tìm thấy");
        return;
    }
    games.splice(index, 1);
    alert("Xóa thành công");
}

function case6() {
    let developer = prompt("Nhập hãng muốn cập nhật:");
    let list = games.filter(g => g.developer === developer);
    if (list.length === 0) {
        alert("Không tìm thấy");
        return;
    }

    let newDev = prompt("Nhập tên hãng mới:");
    list.forEach(g => g.developer = newDev);
    alert("Cập nhật thành công");
}

function case7() {
    let subChoice = prompt(`
1. Tìm theo tên
2. Tìm theo thể loại
`);
    if (subChoice === "1") case71();
    if (subChoice === "2") case72();
}

function case71() {
    let name = prompt("Nhập tên game:");
    let game = games.find(g => g.name.toLowerCase() === name.toLowerCase());
    if (!game) {
        alert("Không tìm thấy");
        return;
    }
    alert(`Tên: ${game.name} | Giá: ${game.price}$ | Thể loại: ${game.category} | Hãng: ${game.developer}`);
}

function case72() {
    let category = prompt("Nhập thể loại:");
    let list = games.filter(g => g.category.toLowerCase() === category.toLowerCase());
    if (list.length === 0) {
        alert("Không tìm thấy");
        return;
    }
    let result = "===== KẾT QUẢ =====\n";
    list.forEach(g => {
        result += `${g.name} - ${g.price}$ - ${g.developer}\n`;
    });
    alert(result);
}

function case8() {
    games.sort((a, b) => a.price - b.price);
    alert("Đã sắp xếp tăng dần theo giá");
    case3();
}

function case9() {
    let id = prompt("Nhập ID game muốn bán:");
    let game = games.find(g => g.id === id);
    if (!game) {
        alert("Không tìm thấy");
        return;
    }

    let quantity = Number(prompt("Nhập số lượng bán:"));
    if (isNaN(quantity) || quantity <= 0 || quantity > game.amount) {
        alert("Số lượng không hợp lệ");
        return;
    }

    game.amount -= quantity;
    alert(`Bán thành công. Còn lại ${game.amount} sản phẩm`);
}
</script>
</body>
</html>
